services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: holdings
      POSTGRES_PASSWORD: holdings
      POSTGRES_DB: holdingofbags
    ports: ["5432:5432"]
    volumes: ["db_data:/var/lib/postgresql/data"]
  db-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: holdings
      POSTGRES_PASSWORD: holdings
      POSTGRES_DB: holdingofbags_test
    ports: ["5433:5432"]
volumes:
  db_data:
